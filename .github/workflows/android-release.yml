name: Build Android AAB

# Builds the Play Store release bundle (.aab) for the PSAT Capacitor app.
# The repository's network policy blocks Google's Android hosts, so the
# bundle is produced here on a GitHub-hosted runner (Android SDK preinstalled,
# unrestricted network) and uploaded as a downloadable artifact.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Capacitor
        run: |
          npm run build
          npx cap sync android

      # Decode the release keystore from a base64-encoded secret, if present.
      # Without it the bundle is built unsigned (for testing the pipeline).
      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # Debug APK — directly installable on your own phone (no signing needed).
      # Best for personal use ("나만 쓰기"): download, transfer, and sideload.
      - name: Build debug APK
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: psat-debug-apk
          path: app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Release AAB — for Google Play upload (requires the keystore secrets).
      - name: Build release AAB
        working-directory: app/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: psat-release-aab
          path: app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
